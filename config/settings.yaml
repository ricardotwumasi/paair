# PAAIR Configuration
# Version: 1.0

# ─── Model Configuration ───
model:
  name: "qwen3.5:9b"
  endpoint: "http://localhost:11434"
  # Alternative models (uncomment to switch):
  # name: "llama3.3:8b-instruct-q5_K_M"
  # name: "mistral-small:7b-q5_K_M"
  # name: "phi4-mini:3.8b-q5_K_M"
  temperature: 0.3
  max_tokens: 2048
  # Context window for email + system prompt + tools
  context_window: 32768

# ─── Email Configuration ───
email:
  paair_address: "assistant@paair.ricardotwumasi.com"
  # Ricardo's institutional email (injected as CC on all outbound)
  ricardo_email: "${RICARDO_EMAIL}"
  # Resend API key (from environment variable)
  resend_api_key: "${RESEND_API_KEY}"

# ─── Booking Links Configuration ───
# Replaces Microsoft Graph calendar (Azure AD admin consent not available at KCL).
# PAAIR offers these links once a valid meeting reason is established.
booking_links:
  phone_15min: "https://outlook.office.com/bookwithme/user/869635f8326043a3a42b0e9183a65878@kcl.ac.uk/meetingtype/u4R5VachQk6JYFA9Haohtw2?bookingcode=106c3d70-2e09-4657-b42d-b80c42e2f480&anonymous&ismsaljsauthenabled&ep=mLinkFromTile"
  meeting_25min: "https://outlook.office.com/bookwithme/user/869635f8326043a3a42b0e9183a65878@kcl.ac.uk/meetingtype/oyQQ3Iln4E-7kzcTgSLP0w2?bookingcode=dc507709-5109-40bb-8a56-bc8a52f23fda&anonymous&ismsaljsauthenabled&ep=mLinkFromTile"
  meeting_50min: "https://outlook.office.com/bookwithme/user/869635f8326043a3a42b0e9183a65878@kcl.ac.uk/meetingtype/eEuG2N0Ij0uFvCOJ0h3fUQ2?bookingcode=35814983-032a-47c9-931f-06b658c09993&anonymous&ismsaljsauthenabled&ep=mLinkFromTile"

# ─── Notification Configuration ───
notifications:
  # Primary: Telegram
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  # Secondary: Email digest
  email_digest:
    enabled: true
    recipient: "${RICARDO_PERSONAL_EMAIL}"
    digest_time: "18:00"
    timezone: "Europe/London"

# ─── Safety and Rate Limiting ───
safety:
  # Maximum autonomous responses per day (total)
  max_responses_per_day: 20
  # Maximum responses to a single sender per day
  max_per_sender_per_day: 5
  # Domain allowlist mode: "allow" (only listed domains) or "warn" (process all, flag unknown)
  domain_mode: "warn"

# ─── Absence Configuration ───
absence:
  return_date: "2026-04-15"
  fallback_contact_name: "${FALLBACK_CONTACT_NAME}"
  fallback_contact_email: "${FALLBACK_CONTACT_EMAIL}"
  ricardo_surname: "${RICARDO_SURNAME}"

# ─── Webhook Configuration ───
webhook:
  # Cloudflare Tunnel or ngrok URL (set after tunnel is established)
  external_url: "${WEBHOOK_EXTERNAL_URL}"
  # n8n webhook path
  path: "/webhook/paair-inbound"
  # Secret for webhook validation
  secret: "${WEBHOOK_SECRET}"

# ─── Research Context ───
research:
  # Path to paper metadata index
  papers_path: "./research/papers.yaml"
  # Maximum papers to inject into LLM context per email
  max_context_papers: 8
  # Minimum keyword relevance score to include a paper
  min_relevance_score: 1

# ─── Logging ───
logging:
  # SQLite database path
  database: "./logs/paair.db"
  # Log level: debug, info, warn, error
  level: "info"
  # Whether to log full email bodies (privacy consideration)
  log_email_bodies: false
