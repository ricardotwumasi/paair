  - title: "From Margins to Mainstream: Embracing Neurodiverse Needs for an Inclusive Workplace"
    authors: "Twumasi R, Burton L"
    year: 2024
    journal: "Ought: The Journal of Autistic Culture"
    doi: "10.9707/2833-1508.1198"
    topics: ["neurodiversity", "workplace", "inclusion", "autism", "organisational psychology"]
    abstract: "This article critically examines the dominance of neurotypical norms in contemporary workplaces and explores the potential for inclusive, neurodiverse workplaces to move from the margins to the mainstream. We offer a brief scoping review of the existing review literature on neurodivergence at work. Focusing on the more common neurominority differences such as autism spectrum, dyslexia and ADHD we apply the neurodiversity framework to challenge traditional notions of workplace "professionalism" and productivity. By synthesizing current research we propose constructive suggestions for creating truly neurodiverse work environments. Our analysis shows that the research community is calling out for long-term, scientific intervention trials to create high-quality evidence on what works to create a neuroinclusive workplace of the future. We conclude by envisioning what neurodivergent work might look like, offering practical recommendations for employers and policymakers to foster genuinely inclusive workplaces that value and leverage neurodiverse perspectives. Practitioner Summary: This article provides a critical examination of neurotypical norms in the workplace and offers practical strategies for creating neuro-inclusive work environments. Key takeaways for HR professionals, managers, and organizational leaders include: 1. Understanding the neurodiversity framework and its implications for workplace design. 2. Recognizing the limitations of current DEI initiatives in addressing neurodiverse 3. Implementing evidence-based physical environment adaptations to support neurodiverse employees. 4. Adopting communication strategies that accommodate diverse cognitive styles. 5. Rethinking traditional notions of productivity and professionalism to leverage neurodiverse strengths. 6. Fostering a workplace culture that actively celebrates cognitive diversity. By implementing these strategies, organizations can create more inclusive, innovative, and productive work environments that benefit all employees, regardless of neurological profile."
    key_findings:
      - "[FILL IN]"
    public_url: "https://kclpure.kcl.ac.uk/ws/portalfiles/portal/316814853/From_Margins_to_Mainstream_Embracing_Neurodiverse_Needs_for_an_I.pdf"

  - title: "Walking Works Wonders: a tailored workplace intervention evaluated over 24 months"
    authors: "Haslam, C et al."
    year: 2018
    journal: "Ergonomics"
    doi: "10.1080/00140139.2018.1489982"
    topics: ["workplace health", "walking", "intervention", "health promotion", "occupational health"]
    abstract: "This article presents longitudinal data from 1120 participants across 10 worksites enrolled in Walking Works Wonders, a tailored intervention designed to increase physical activity and reduce sedentary behaviour. The intervention was evaluated over 2 years, using a quasi-experimental design comprising 3 conditions: tailored information; standard information and control. This study explored the impact of the intervention on objective measures (BMI, %Fat, waist circumference, blood pressure and heart rate) and self-reported measures of physical activity, sedentary behaviour, physical and psychological health. Interventions tailored to employees’ stage of change significantly reduced BMI and waist circumference compared to standard and control conditions. Employees who received either a standard or tailored intervention demonstrated significantly higher work ability, organizational commitment, job motivation, job satisfaction and a reduction in intention to quit the organization. The results suggest that adopting a tailored approach to interventions is particularly effective in terms of improving health in the workplace.""
    practitioner_summary: "This study describes Walking Works Wonders, a tailored intervention, which aims to encourage physical activity in the workplace. The study evaluated Walking Works Wonders over a 2 year period and demonstrated that interventions are more effective in improving health outcomes where the information is tailored to employees’ stage of change."
    key_findings:
      - "[FILL IN]"

